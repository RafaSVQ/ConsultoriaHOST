<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo con gradiente de azul marino a azul -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F2B5B"/>
      <stop offset="100%" stop-color="#1A56A8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E8621A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Acento naranja en esquina superior derecha -->
  <circle cx="52" cy="12" r="8" fill="url(#accent)" opacity="0.9"/>

  <!-- Letra H centrada -->
  <text
    x="32"
    y="44"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="38"
    text-anchor="middle"
    fill="white"
    letter-spacing="-1"
  >H</text>
</svg>
